# ============================================================
# Docker 镜像构建 - Stage 1: 工具链镜像
# ============================================================
# 输出镜像: ghcr.io/{owner}/gluten-build:toolchain-{version}
#
# 包含工具链:
#   - JDK: 8u462, 17, 21.0.9 (BiSheng)
#   - Maven: 3.9.9
#   - CMake: 3.28.2
#   - LLVM: 15.0.4
#   - Protobuf: 3.21.9
#   - Lcov: 1.16
#   - fmt: 10.1.1, folly: 2024.07.01.00
# ============================================================

name: Build Toolchain Image (Stage 1)

on:
  push:
    branches:
      - main
    paths:
      - '.ci/docker/openeuler_2203_sp3_01.Dockerfile'
      - '.ci/docker/openEuler.repo'
      - '.github/workflows/docker-build-stage1.yml'
  workflow_dispatch:
    inputs:
      push_image:
        description: '推送镜像到仓库'
        required: true
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  SWR_BASE_IMAGE: swr.cn-north-4.myhuaweicloud.com/cloud_boostkit/openeuler22.03_lts_sp3:latest

jobs:
  # ==================== 计算版本标签 ====================
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      build_date: ${{ steps.version.outputs.build_date }}
      image_tag: ${{ steps.version.outputs.image_tag }}
      image_name: ${{ steps.version.outputs.image_name }}

    steps:
      - name: Generate version tags
        id: version
        run: |
          BUILD_DATE=$(date +%Y%m%d)
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT

          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${OWNER_LOWER}/gluten-build"
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT

          # 工具链版本标签
          IMAGE_TAG="toolchain-jdk21.0.9-maven3.9.9-llvm15.0.4-v${BUILD_DATE}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

          echo "📦 镜像标签: ${IMAGE_TAG}"

  # ==================== 构建工具链镜像 ====================
  build:
    name: Build Toolchain Image
    runs-on: ubuntu-22.04-arm
    needs: prepare
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' || inputs.push_image == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .ci/docker
          file: .ci/docker/openeuler_2203_sp3_01.Dockerfile
          push: ${{ github.event_name == 'push' || inputs.push_image == true }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:toolchain-latest
          cache-from: type=gha,scope=toolchain
          cache-to: type=gha,mode=max,scope=toolchain
          build-args: |
            BASE_IMAGE=${{ env.SWR_BASE_IMAGE }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            IMAGE_VERSION=${{ needs.prepare.outputs.image_tag }}
          provenance: false
          sbom: false

      - name: Show build result
        run: |
          echo "## 🔧 工具链镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本标签 | \`${{ needs.prepare.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像地址 | \`${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest | \`${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:toolchain-latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**包含工具:** JDK 8/17/21, Maven 3.9.9, CMake 3.28.2, LLVM 15.0.4, Protobuf 3.21.9" >> $GITHUB_STEP_SUMMARY

    outputs:
      image_tag: ${{ needs.prepare.outputs.image_tag }}
      image_name: ${{ needs.prepare.outputs.image_name }}

  # ==================== 触发 Stage 2 构建 ====================
  trigger-stage2:
    name: Trigger Stage 2 Build
    runs-on: ubuntu-latest
    needs: build
    if: success() && (github.event_name == 'push' || inputs.push_image == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Stage 2 workflow
        run: |
          echo "🚀 触发 Stage 2 (依赖镜像) 构建..."
          gh workflow run docker-build-stage2.yml \
            -f toolchain_image="${{ env.REGISTRY }}/${{ needs.build.outputs.image_name }}:${{ needs.build.outputs.image_tag }}" \
            -f push_image=true
          echo "✅ Stage 2 构建已触发"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}