name: Build Gluten for Kunpeng (ARM)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      gluten_branch:
        description: 'Gluten 代码分支'
        required: false
        default: 'master'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Check Docker dependency
      run: |
        echo "检查Docker环境依赖..."
        if ! command -v docker &> /dev/null; then
            echo "Docker未安装，请先安装Docker后再执行脚本！"
            exit 1
        fi
        if ! docker info &> /dev/null; then
            echo "Docker服务未运行，请执行 'systemctl start docker' 启动服务后再试！"
            exit 1
        fi
        echo "Docker环境依赖检查通过"

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: maven-docker-cache
        key: ${{ runner.os }}-arm-maven-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-arm-maven-

    - name: Cache Docker image
      uses: actions/cache@v4
      with:
        path: docker-image-cache
        key: ${{ runner.os }}-arm-docker-openeuler22.03-arm64_003
        restore-keys: |
          ${{ runner.os }}-arm-docker-

    - name: Load or pull Docker image
      run: |
        IMAGE="swr.cn-north-4.myhuaweicloud.com/cloud_boostkit/openeuler22.03_lts_sp3:arm64_003"
        CACHE_FILE="${{ github.workspace }}/docker-image-cache/openeuler.tar"

        if [[ -f "$CACHE_FILE" ]]; then
            echo "从缓存加载Docker镜像..."
            docker load -i "$CACHE_FILE"
            echo "Docker镜像加载成功"
        else
            echo "拉取SWR公开镜像：$IMAGE"
            if docker pull "$IMAGE"; then
                echo "SWR镜像拉取成功"
                mkdir -p docker-image-cache
                echo "保存镜像到缓存..."
                docker save -o "$CACHE_FILE" "$IMAGE"
                echo "镜像已缓存到: $CACHE_FILE"
            else
                echo "SWR镜像拉取失败！请检查：1.镜像地址是否正确 2.网络是否能访问华为云SWR"
                exit 1
            fi
        fi

    - name: Create local directories
      run: |
        echo "创建本地目录..."
        mkdir -p build-output
        mkdir -p maven-docker-cache

    - name: Start build container
      run: |
        echo "启动构建容器 gluten-project-builder..."
        docker run -d \
            --name gluten-project-builder \
            --user root \
            --entrypoint /bin/sh \
            -v "${{ github.workspace }}/maven-docker-cache:/root/.m2" \
            --workdir "/opt" \
            swr.cn-north-4.myhuaweicloud.com/cloud_boostkit/openeuler22.03_lts_sp3:arm64_003 \
            -c "tail -f /dev/null"

        if docker ps --filter "name=^/gluten-project-builder$" --format "{{.Names}}" | grep -q "^gluten-project-builder$"; then
            echo "构建容器 gluten-project-builder 启动成功"
        else
            echo "构建容器启动失败！请检查镜像是否可正常运行"
            exit 1
        fi

    - name: Pull code to container
      run: |
        echo "拉取代码到容器..."
        docker exec -t -u root gluten-project-builder bash -c "\
            set -euo pipefail; \
            \
            # Gluten 仓库
            echo '克隆 Gluten 仓库...'; \
            rm -rf /opt/gluten; \
            git clone https://gitcode.com/openeuler/Gluten.git /opt/gluten; \
            \
            # OmniOperator 仓库
            echo '克隆 OmniOperator 仓库...'; \
            rm -rf /opt/OmniOperatorJIT; \
            git clone https://gitcode.com/openeuler/OmniOperator.git /opt/OmniOperatorJIT; \
            \
            # libboundscheck 仓库
            echo '克隆 libboundscheck 仓库...'; \
            rm -rf /opt/libboundscheck; \
            git clone https://gitcode.com/openeuler/libboundscheck.git /opt/libboundscheck; \
            cd /opt/libboundscheck && git checkout tags/v1.1.16; \
            \
            # BoostKit_CI 仓库
            echo '克隆 BoostKit_CI 仓库...'; \
            rm -rf /opt/BoostKit_CI; \
            git clone https://codehub.devcloud.cn-north-4.huaweicloud.com/Kunpeng_BoostKit00001/BoostKit_CI.git /opt/BoostKit_CI; \
        "
        echo "代码拉取完成，存放路径：/opt/"

    - name: Execute build script
      run: |
        gluten_branch="${{ inputs.gluten_branch || 'master' }}"
        echo "执行构建脚本，Gluten 分支：$gluten_branch"
        docker exec -t \
            -e WORKSPACE=/opt \
            -e gluten_branch="$gluten_branch" \
            gluten-project-builder \
            bash -c "chmod +x /opt/BoostKit_CI/script/bigdata/Gluten_compile.sh && \
                     dos2unix /opt/BoostKit_CI/script/bigdata/Gluten_compile.sh && \
                     /opt/BoostKit_CI/script/bigdata/Gluten_compile.sh package"
        echo "构建脚本执行完成！"

    - name: Copy artifact from container
      run: |
        echo "从容器中拷贝构建产物..."
        if docker cp gluten-project-builder:/opt/toCMC/gluten.zip "${{ github.workspace }}/build-output/"; then
            echo "构建产物拷贝成功！路径：${{ github.workspace }}/build-output/gluten.zip"
        else
            echo "构建产物拷贝失败！请检查容器中是否存在 /opt/toCMC/gluten.zip 文件"
            exit 1
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gluten-artifacts-arm
        path: build-output/gluten.zip

    - name: Cleanup container
      if: always()
      run: |
        echo "清理构建容器..."
        docker stop gluten-project-builder || true
        docker rm gluten-project-builder || true