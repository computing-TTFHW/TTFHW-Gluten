name: Build Gluten for Kunpeng (ARM)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      gluten_branch:
        description: 'Gluten 代码分支'
        required: false
        default: 'master'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Check Docker dependency
      run: |
        echo "检查Docker环境依赖..."
        if ! command -v docker &> /dev/null; then
            echo "Docker未安装，请先安装Docker后再执行脚本！"
            exit 1
        fi
        if ! docker info &> /dev/null; then
            echo "Docker服务未运行，请执行 'systemctl start docker' 启动服务后再试！"
            exit 1
        fi
        echo "Docker环境依赖检查通过"

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: maven-docker-cache
        key: ${{ runner.os }}-arm-maven-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-arm-maven-

    - name: Cache Docker image
      uses: actions/cache@v4
      with:
        path: docker-image-cache
        key: ${{ runner.os }}-arm-docker-gluten-build-deps
        restore-keys: |
          ${{ runner.os }}-arm-docker-gluten-build-
          ${{ runner.os }}-arm-docker-

    - name: Load or pull Docker image
      run: |
        IMAGE="ghcr.io/computing-ttfhw/gluten-build:deps-latest"
        CACHE_FILE="${{ github.workspace }}/docker-image-cache/gluten-build.tar"

        if [[ -f "$CACHE_FILE" ]]; then
            echo "从缓存加载Docker镜像..."
            docker load -i "$CACHE_FILE"
            echo "Docker镜像加载成功"
        else
            echo "拉取GHCR镜像：$IMAGE"
            if docker pull "$IMAGE"; then
                echo "GHCR镜像拉取成功"
                mkdir -p docker-image-cache
                echo "保存镜像到缓存..."
                docker save -o "$CACHE_FILE" "$IMAGE"
                echo "镜像已缓存到: $CACHE_FILE"
            else
                echo "GHCR镜像拉取失败！请检查：1.镜像地址是否正确 2.是否已登录 ghcr.io"
                exit 1
            fi
        fi

    - name: Create local directories
      run: |
        echo "创建本地目录..."
        mkdir -p build-output
        mkdir -p maven-docker-cache

    - name: Start build container
      run: |
        echo "启动构建容器 gluten-project-builder..."
        docker run -d \
            --name gluten-project-builder \
            --user root \
            --entrypoint /bin/sh \
            -v "${{ github.workspace }}/maven-docker-cache:/root/.m2" \
            --workdir "/opt" \
            ghcr.io/computing-ttfhw/gluten-build:deps-latest \
            -c "tail -f /dev/null"

        if docker ps --filter "name=^/gluten-project-builder$" --format "{{.Names}}" | grep -q "^gluten-project-builder$"; then
            echo "构建容器 gluten-project-builder 启动成功"
        else
            echo "构建容器启动失败！请检查镜像是否可正常运行"
            exit 1
        fi

    - name: Copy build scripts to container
      run: |
        echo "复制构建脚本到容器..."
        docker exec -t -u root gluten-project-builder mkdir -p /opt/.ci/build
        docker cp "${{ github.workspace }}/.ci/build/." gluten-project-builder:/opt/.ci/build/
        echo "构建脚本复制完成！"

    - name: Execute build script
      run: |
        gluten_branch="${{ inputs.gluten_branch || 'master' }}"
        echo "执行构建脚本，Gluten 分支：$gluten_branch"
        docker exec -t \
            -e WORKSPACE=/opt \
            -e gluten_branch="$gluten_branch" \
            gluten-project-builder \
            bash -c "chmod +x /opt/.ci/build/Gluten_compile.sh && \
                     dos2unix /opt/.ci/build/Gluten_compile.sh && \
                     /opt/.ci/build/Gluten_compile.sh package"
        echo "构建脚本执行完成！"

    - name: Copy artifact from container
      run: |
        echo "从容器中拷贝构建产物..."
        if docker cp gluten-project-builder:/opt/toCMC/gluten.zip "${{ github.workspace }}/build-output/"; then
            echo "构建产物拷贝成功！路径：${{ github.workspace }}/build-output/gluten.zip"
        else
            echo "构建产物拷贝失败！请检查容器中是否存在 /opt/toCMC/gluten.zip 文件"
            exit 1
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gluten-artifacts-arm
        path: build-output/gluten.zip

    - name: Cleanup container
      if: always()
      run: |
        echo "清理构建容器..."
        docker stop gluten-project-builder || true
        docker rm gluten-project-builder || true