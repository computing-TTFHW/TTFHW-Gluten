name: Build Docker Images (Layered)

on:
  push:
    branches:
      - main
    paths:
      - '.ci/docker/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      build_stage:
        description: '构建阶段 (all, stage-1, stage-2)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - stage-1
          - stage-2
      push_images:
        description: '推送镜像到仓库'
        required: true
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  # 华为云 SWR 基础镜像
  SWR_BASE_IMAGE: swr.cn-north-4.myhuaweicloud.com/cloud_boostkit/openeuler22.03_lts_sp3:latest

jobs:
  # ==================== Stage 1: 构建基础镜像 (tag: 26330_01) ====================
  stage-1:
    name: Build Stage 1 → 26330_01
    runs-on: ubuntu-latest
    if: inputs.build_stage == 'all' || inputs.build_stage == 'stage-1' || github.event_name == 'push'
    outputs:
      image_full: ${{ steps.image_info.outputs.image_full }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase)
        id: image_info
        run: |
          # Docker 镜像名称必须是小写
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${OWNER_LOWER}/openeuler-build"
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "image_full=${{ env.REGISTRY }}/${IMAGE_NAME}:26330_01" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' || inputs.push_images == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine push flag
        id: push_flag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "should_push=true" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.push_images }}" = "true" ]; then
            echo "should_push=true" >> $GITHUB_OUTPUT
          else
            echo "should_push=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Stage 1
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .ci/docker
          file: .ci/docker/openeuler_2203_sp3_01.Dockerfile
          push: ${{ steps.push_flag.outputs.should_push == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_info.outputs.image_name }}:26330_01
            ${{ env.REGISTRY }}/${{ steps.image_info.outputs.image_name }}:latest
          cache-from: type=gha,scope=stage1
          cache-to: type=gha,mode=max,scope=stage1
          build-args: |
            BASE_IMAGE=${{ env.SWR_BASE_IMAGE }}
          platforms: linux/arm64
          provenance: false
          sbom: false

      - name: Show build result
        run: |
          echo "### Stage 1 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "- 镜像: \`${{ env.REGISTRY }}/${{ steps.image_info.outputs.image_name }}:26330_01\`" >> $GITHUB_STEP_SUMMARY
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ==================== Stage 2: 应用镜像 (tag: 26330_02) ====================
  stage-2:
    name: Build Stage 2 → 26330_02
    runs-on: ubuntu-latest
    needs: stage-1
    if: always() && (needs.stage-1.result == 'success' || inputs.build_stage == 'stage-2')
    outputs:
      image_full: ${{ steps.image_info.outputs.image_full }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase)
        id: image_info
        run: |
          # Docker 镜像名称必须是小写
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${OWNER_LOWER}/openeuler-build"
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "image_full=${{ env.REGISTRY }}/${IMAGE_NAME}:26330_02" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' || inputs.push_images == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine push flag
        id: push_flag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "should_push=true" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.push_images }}" = "true" ]; then
            echo "should_push=true" >> $GITHUB_OUTPUT
          else
            echo "should_push=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine base image
        id: base
        run: |
          # 单独构建 stage-2 时，使用已推送的 stage-1 镜像
          if [ "${{ inputs.build_stage }}" = "stage-2" ]; then
            BASE="${{ env.REGISTRY }}/${{ steps.image_info.outputs.image_name }}:26330_01"
            echo "单独构建 Stage 2，使用已推送的 Stage 1 镜像: ${BASE}"
          else
            BASE="${{ needs.stage-1.outputs.image_full }}"
            echo "正常构建，使用 Stage 1 输出: ${BASE}"
          fi
          echo "base_image=${BASE}" >> $GITHUB_OUTPUT

      - name: Build and push Stage 2
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .ci/docker
          file: .ci/docker/openeuler_2203_sp3_02.Dockerfile
          push: ${{ steps.push_flag.outputs.should_push == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_info.outputs.image_name }}:26330_02
          cache-from: type=gha,scope=stage2
          cache-to: type=gha,mode=max,scope=stage2
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.base_image }}
          platforms: linux/arm64
          provenance: false
          sbom: false

      - name: Show build result
        run: |
          echo "### Stage 2 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "- 基础镜像: \`${{ steps.base.outputs.base_image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 镜像: \`${{ env.REGISTRY }}/${{ steps.image_info.outputs.image_name }}:26330_02\`" >> $GITHUB_STEP_SUMMARY
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ==================== 构建摘要 ====================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [stage-1, stage-2]
    if: always()

    steps:
      - name: Set image name (lowercase)
        id: image_info
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${OWNER_LOWER}/openeuler-build" >> $GITHUB_OUTPUT

      - name: Generate build summary
        run: |
          IMAGE_NAME="${{ steps.image_info.outputs.image_name }}"

          echo "## Docker 镜像构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Tag | 状态 | 镜像地址 |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|------|----------|" >> $GITHUB_STEP_SUMMARY

          # Stage 1
          if [ "${{ needs.stage-1.result }}" = "success" ]; then
            echo "| Stage 1 (基础镜像) | 26330_01 | ✅ 成功 | \`${{ env.REGISTRY }}/${IMAGE_NAME}:26330_01\` |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.stage-1.result }}" = "skipped" ]; then
            echo "| Stage 1 (基础镜像) | 26330_01 | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Stage 1 (基础镜像) | 26330_01 | ❌ 失败 | - |" >> $GITHUB_STEP_SUMMARY
          fi

          # Stage 2
          if [ "${{ needs.stage-2.result }}" = "success" ]; then
            echo "| Stage 2 (应用镜像) | 26330_02 | ✅ 成功 | \`${{ env.REGISTRY }}/${IMAGE_NAME}:26330_02\` |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.stage-2.result }}" = "skipped" ]; then
            echo "| Stage 2 (应用镜像) | 26330_02 | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Stage 2 (应用镜像) | 26330_02 | ❌ 失败 | - |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 构建流程图" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "SWR (openEuler 22.03 SP3 基础镜像)" >> $GITHUB_STEP_SUMMARY
          echo "        │" >> $GITHUB_STEP_SUMMARY
          echo "        ▼" >> $GITHUB_STEP_SUMMARY
          echo "┌─────────────────────────────────────────────┐" >> $GITHUB_STEP_SUMMARY
          echo "│ Stage 1: 构建基础镜像 (26330_01)            │" >> $GITHUB_STEP_SUMMARY
          echo "│ ─────────────────────────────────────────── │" >> $GITHUB_STEP_SUMMARY
          echo "│ • 编译工具链: JDK8/17/21, Maven, CMake      │" >> $GITHUB_STEP_SUMMARY
          echo "│ • LLVM-15, Protobuf, Lcov                   │" >> $GITHUB_STEP_SUMMARY
          echo "│ • 基础库: fmt, folly                        │" >> $GITHUB_STEP_SUMMARY
          echo "│ • Python 包, 所有系统依赖                   │" >> $GITHUB_STEP_SUMMARY
          echo "└─────────────────────────────────────────────┘" >> $GITHUB_STEP_SUMMARY
          echo "        │" >> $GITHUB_STEP_SUMMARY
          echo "        ▼" >> $GITHUB_STEP_SUMMARY
          echo "┌─────────────────────────────────────────────┐" >> $GITHUB_STEP_SUMMARY
          echo "│ Stage 2: 应用镜像 (26330_02)                │" >> $GITHUB_STEP_SUMMARY
          echo "│ ─────────────────────────────────────────── │" >> $GITHUB_STEP_SUMMARY
          echo "│ • 应用依赖: Arrow, ORC, Hadoop              │" >> $GITHUB_STEP_SUMMARY
          echo "│ • 压缩库: jemalloc, zstd, lz4, snappy       │" >> $GITHUB_STEP_SUMMARY
          echo "│ • Gluten依赖: abseil-cpp, re2               │" >> $GITHUB_STEP_SUMMARY
          echo "│ • OmniStream: xxHash, rocksdb               │" >> $GITHUB_STEP_SUMMARY
          echo "│ • Jenkins Agent 配置                        │" >> $GITHUB_STEP_SUMMARY
          echo "│ • 依赖产物收集                              │" >> $GITHUB_STEP_SUMMARY
          echo "└─────────────────────────────────────────────┘" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 使用方式" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# 拉取最终镜像" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${IMAGE_NAME}:26330_02" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY