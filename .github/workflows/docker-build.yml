# ============================================================
# Docker 镜像构建 Workflow
# ============================================================
# 镜像命名策略:
#   Stage 1 (工具链): gluten-build:toolchain-jdk{jdk}-maven{maven}-llvm{llvm}-v{date}
#   Stage 2 (依赖):   gluten-build:deps-arrow{arrow}-rocksdb{rocksdb}-v{date}
#
# 触发方式:
#   - push 到 main 分支（.ci/docker/** 变更）
#   - 手动触发（可选择性构建 stage）
# ============================================================

name: Build Docker Images

on:
  push:
    branches:
      - main
    paths:
      - '.ci/docker/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      build_stage:
        description: '构建阶段'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - toolchain
          - deps
      push_images:
        description: '推送镜像到仓库'
        required: true
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  # 基础镜像
  SWR_BASE_IMAGE: swr.cn-north-4.myhuaweicloud.com/cloud_boostkit/openeuler22.03_lts_sp3:latest

jobs:
  # ==================== 准备阶段：计算版本标签 ====================
  prepare:
    name: Prepare Version Tags
    runs-on: ubuntu-latest
    outputs:
      build_date: ${{ steps.version.outputs.build_date }}
      toolchain_tag: ${{ steps.version.outputs.toolchain_tag }}
      deps_tag: ${{ steps.version.outputs.deps_tag }}
      image_name: ${{ steps.version.outputs.image_name }}

    steps:
      - name: Generate version tags
        id: version
        run: |
          # 构建日期
          BUILD_DATE=$(date +%Y%m%d)
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT

          # 镜像名称（小写）
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${OWNER_LOWER}/gluten-build"
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT

          # Stage 1 (工具链) 版本标签
          # 格式: toolchain-jdk21.0.9-maven3.9.9-llvm15.0.4-v20260331
          TOOLCHAIN_TAG="toolchain-jdk21.0.9-maven3.9.9-llvm15.0.4-v${BUILD_DATE}"
          echo "toolchain_tag=${TOOLCHAIN_TAG}" >> $GITHUB_OUTPUT
          echo "📦 Stage 1 标签: ${TOOLCHAIN_TAG}"

          # Stage 2 (依赖) 版本标签
          # 格式: deps-arrow15.0.0-rocksdb8.11-re2.11-v20260331
          DEPS_TAG="deps-arrow15.0.0-rocksdb8.11-re2.11-v${BUILD_DATE}"
          echo "deps_tag=${DEPS_TAG}" >> $GITHUB_OUTPUT
          echo "📦 Stage 2 标签: ${DEPS_TAG}"

  # ==================== Stage 1: 构建工具链镜像 ====================
  toolchain:
    name: Build Toolchain Image
    runs-on: ubuntu-22.04-arm
    needs: prepare
    if: inputs.build_stage == 'all' || inputs.build_stage == 'toolchain' || github.event_name == 'push'
    outputs:
      image_full: ${{ steps.build.outputs.image_full }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' || inputs.push_images == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Toolchain image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .ci/docker
          file: .ci/docker/openeuler_2203_sp3_01.Dockerfile
          push: ${{ github.event_name == 'push' || inputs.push_images == true }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.toolchain_tag }}
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:toolchain-latest
          cache-from: type=gha,scope=toolchain
          cache-to: type=gha,mode=max,scope=toolchain
          build-args: |
            BASE_IMAGE=${{ env.SWR_BASE_IMAGE }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            IMAGE_VERSION=${{ needs.prepare.outputs.toolchain_tag }}
          provenance: false
          sbom: false

      - name: Show build result
        run: |
          echo "### 🔧 工具链镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | \`${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.toolchain_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest | \`${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:toolchain-latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**包含工具:**" >> $GITHUB_STEP_SUMMARY
          echo "- JDK 8u462, JDK 17, BiSheng JDK 21.0.9" >> $GITHUB_STEP_SUMMARY
          echo "- Maven 3.9.9, CMake 3.28.2" >> $GITHUB_STEP_SUMMARY
          echo "- LLVM 15.0.4, Protobuf 3.21.9" >> $GITHUB_STEP_SUMMARY
          echo "- fmt 10.1.1, folly 2024.07.01.00" >> $GITHUB_STEP_SUMMARY

  # ==================== Stage 2: 构建依赖镜像 ====================
  deps:
    name: Build Dependencies Image
    runs-on: ubuntu-22.04-arm
    needs: [prepare, toolchain]
    if: |
      (inputs.build_stage == 'all' || inputs.build_stage == 'deps') &&
      (needs.toolchain.result == 'success' || inputs.build_stage == 'deps')
    outputs:
      image_full: ${{ steps.build.outputs.image_full }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' || inputs.push_images == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine base image
        id: base
        run: |
          # 单独构建 deps 时，使用已推送的 toolchain 镜像
          if [ "${{ inputs.build_stage }}" = "deps" ]; then
            BASE="${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:toolchain-latest"
            echo "📌 单独构建依赖镜像，使用最新工具链: ${BASE}"
          else
            BASE="${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.toolchain_tag }}"
            echo "📌 使用刚构建的工具链镜像: ${BASE}"
          fi
          echo "base_image=${BASE}" >> $GITHUB_OUTPUT

      - name: Build and push Dependencies image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .ci/docker
          file: .ci/docker/openeuler_2203_sp3_02.Dockerfile
          push: ${{ github.event_name == 'push' || inputs.push_images == true }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.deps_tag }}
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:deps-latest
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:latest
          cache-from: type=gha,scope=deps
          cache-to: type=gha,mode=max,scope=deps
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.base_image }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            IMAGE_VERSION=${{ needs.prepare.outputs.deps_tag }}
          provenance: false
          sbom: false

      - name: Show build result
        run: |
          echo "### 📦 依赖镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 基础镜像 | \`${{ steps.base.outputs.base_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | \`${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.deps_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest | \`${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**包含依赖:**" >> $GITHUB_STEP_SUMMARY
          echo "- 压缩库: jemalloc 5.3.0, zstd 1.5.6, lz4 1.10.0, snappy 1.1.10" >> $GITHUB_STEP_SUMMARY
          echo "- OmniStream: xxHash 0.8.2, rocksdb 8.11.4" >> $GITHUB_STEP_SUMMARY
          echo "- Gluten: abseil-cpp 20250127.0, re2 2024-07-02" >> $GITHUB_STEP_SUMMARY
          echo "- 预装: libboundscheck 1.1.16, Arrow 15.0.0 Maven JAR" >> $GITHUB_STEP_SUMMARY

  # ==================== 构建摘要 ====================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, toolchain, deps]
    if: always()

    steps:
      - name: Generate build summary
        run: |
          IMAGE_NAME="${{ needs.prepare.outputs.image_name }}"
          TOOLCHAIN_TAG="${{ needs.prepare.outputs.toolchain_tag }}"
          DEPS_TAG="${{ needs.prepare.outputs.deps_tag }}"

          echo "## 🐳 Docker 镜像构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Tag | 状态 | 镜像地址 |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|------|----------|" >> $GITHUB_STEP_SUMMARY

          # Toolchain
          if [ "${{ needs.toolchain.result }}" = "success" ]; then
            echo "| 🔧 Toolchain | \`${TOOLCHAIN_TAG}\` | ✅ 成功 | \`${{ env.REGISTRY }}/${IMAGE_NAME}:${TOOLCHAIN_TAG}\` |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.toolchain.result }}" = "skipped" ]; then
            echo "| 🔧 Toolchain | - | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔧 Toolchain | - | ❌ 失败 | - |" >> $GITHUB_STEP_SUMMARY
          fi

          # Dependencies
          if [ "${{ needs.deps.result }}" = "success" ]; then
            echo "| 📦 Dependencies | \`${DEPS_TAG}\` | ✅ 成功 | \`${{ env.REGISTRY }}/${IMAGE_NAME}:${DEPS_TAG}\` |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deps.result }}" = "skipped" ]; then
            echo "| 📦 Dependencies | - | ⏭️ 跳过 | - |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📦 Dependencies | - | ❌ 失败 | - |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 使用方式" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# 拉取最新镜像（包含所有依赖）" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${IMAGE_NAME}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 拉取特定版本工具链" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${IMAGE_NAME}:${TOOLCHAIN_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 拉取特定版本依赖镜像" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${IMAGE_NAME}:${DEPS_TAG}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY